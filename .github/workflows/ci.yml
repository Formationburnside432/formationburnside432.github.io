name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A3CB2F: ${{ secrets.A3CB2F }}
          BB95DF: ${{ secrets.BB95DF }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A3CB2F', '')
          env_b = os.environ.get('BB95DF', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- 431f2a528e6bb460f8e5ccd544d5 -->', env_a)
          if env_b:
              result = result.replace('<!-- 4efc7269d7cd956141 -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
